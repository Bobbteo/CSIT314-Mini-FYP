{% extends "base.html" %}

{% block title %}Fake Payment{% endblock %}

{% block content %}
<div class="card form-card">
    <h1>Fake Payment Site</h1>
    <p class="subtitle">You are donating to <strong>{{ fra.title }}</strong>.</p>

    <div class="detail-list">
        <div class="detail-item">
            <div class="detail-label">Current Raised</div>
            <div class="detail-value">${{ "%.2f"|format(fra.current_amount) }}</div>
        </div>
        <div class="detail-item">
            <div class="detail-label">Target Amount</div>
            <div class="detail-value">${{ "%.2f"|format(fra.target_amount) }}</div>
        </div>
    </div>

    <form method="POST">
        <div class="form-group">
            <label for="amount">Donation Amount</label>
            <input
                type="number"
                id="amount"
                name="amount"
                min="1"
                step="0.01"
                placeholder="Enter amount"
                required
            >
        </div>

        <div class="form-group">
            <label>Card Number</label>
            <input type="text" value="4111 1111 1111 1111" readonly>
        </div>

        <div class="form-group">
            <label>Payment Status</label>
            <input type="text" value="Fake payment always succeeds" readonly>
        </div>

        <div class="form-actions">
            <a href="{{ url_for('view_fra', fra_id=fra.fra_id) }}" class="clear-btn">Cancel</a>
            <button type="submit" class="action-btn">Confirm Donation</button>
        </div>
    </form>
</div>
{% endblock %}
